name: Build launcher.ps1

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'build.ps1'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          # launcher.ps1 es autogenerado: se valida por AST mas abajo, no por linter.
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 |
                        Where-Object { $_.ScriptName -ne 'launcher.ps1' }
          $errors = @($findings | Where-Object Severity -eq 'Error')
          $warns  = @($findings | Where-Object Severity -eq 'Warning')
          foreach ($f in $findings) {
            $sev = switch ($f.Severity) { 'Error' { 'error' } 'Warning' { 'warning' } default { 'notice' } }
            Write-Host "::$sev file=$($f.ScriptPath),line=$($f.Line)::[$($f.RuleName)] $($f.Message)"
          }
          Write-Host "PSScriptAnalyzer: $($errors.Count) error(s), $($warns.Count) warning(s)."
          # Por ahora el gate solo BLOQUEA en severidad Error. Las warnings se reducen por fases.
          if ($errors.Count -gt 0) { exit 1 }

      - name: Assert compiled artifacts are fresh (no stale launcher)
        shell: pwsh
        run: |
          # Corre ANTES del build de abajo, sobre el checkout pristino, para
          # detectar si alguien edito src/ sin reconstruir launcher.ps1.
          . ./tests/Assert-LauncherFresh.ps1

      - name: Build launcher.ps1
        shell: pwsh
        run: |
          . ./build.ps1

      - name: Syntax check
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/launcher.ps1",
            [ref]$tokens, [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error file=launcher.ps1,line=$($_.Extent.StartLineNumber)::$($_.Message)" }
            exit 1
          }
          Write-Host "launcher.ps1 parsed cleanly ($(Get-Item launcher.ps1 | ForEach-Object { [math]::Round($_.Length/1KB,1) }) KB)"

      - name: Verify tools syntax
        shell: pwsh
        run: |
          $fail = 0
          Get-ChildItem src/tools/Invoke-*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $fail++
              Write-Host "::error file=$($_.FullName)::Parse errors:"
              $errors | ForEach-Object { Write-Host "  line $($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Validate embedded tool sources (roundtrip parse)
        shell: pwsh
        run: |
          . ./tests/Test-ToolSources.ps1

      - name: Upload built launcher
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: launcher
          path: launcher.ps1
