name: Build launcher.ps1

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'build.ps1'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build launcher.ps1
        shell: pwsh
        run: |
          pwsh -NoProfile -File build.ps1

      - name: Syntax check
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/launcher.ps1",
            [ref]$tokens, [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error file=launcher.ps1,line=$($_.Extent.StartLineNumber)::$($_.Message)" }
            exit 1
          }
          Write-Host "launcher.ps1 parsed cleanly ($(Get-Item launcher.ps1 | ForEach-Object { [math]::Round($_.Length/1KB,1) }) KB)"

      - name: Verify tools syntax
        shell: pwsh
        run: |
          $fail = 0
          Get-ChildItem src/tools/Invoke-*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $fail++
              Write-Host "::error file=$($_.FullName)::Parse errors:"
              $errors | ForEach-Object { Write-Host "  line $($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Validate embedded tool sources (roundtrip parse)
        shell: pwsh
        run: |
          pwsh -NoProfile -File tests/Test-ToolSources.ps1

      - name: Upload built launcher
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: launcher
          path: launcher.ps1
